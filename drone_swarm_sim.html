
<!DOCTYPE html>
<html>
<head>
<style>
  body {
    background: #0d1117;
    margin: 0;
    font-family: monospace;
    color: #c9d1d9;
  }
  #wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px;
  }
  canvas {
    border: 1px solid #30363d;
    cursor: crosshair;
    display: block;
  }
  #controls {
    margin-top: 12px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 32px;
    width: 700px;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }
  .row label {
    width: 150px;
    color: #8b949e;
    text-align: right;
  }
  .row input[type=range] {
    flex: 1;
  }
  .row span {
    width: 36px;
    text-align: left;
    color: #e6edf3;
  }
  #btnrow {
    margin-top: 10px;
    display: flex;
    gap: 12px;
  }
  button {
    background: #21262d;
    color: #c9d1d9;
    border: 1px solid #30363d;
    padding: 6px 18px;
    cursor: pointer;
    font-size: 12px;
    border-radius: 4px;
  }
  button:hover { background: #30363d; }
  #stats {
    margin-top: 8px;
    font-size: 11px;
    color: #8b949e;
    width: 700px;
    text-align: center;
  }
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="c" width="700" height="420"></canvas>

  <div id="controls">
    <div class="row">
      <label>Drones (N)</label>
      <input type="range" id="sl_n" min="5" max="80" value="30" step="1">
      <span id="lbl_n">30</span>
    </div>
    <div class="row">
      <label>Max speed</label>
      <input type="range" id="sl_spd" min="1" max="5" value="2" step="0.1">
      <span id="lbl_spd">2.0</span>
    </div>
    <div class="row">
      <label>View range</label>
      <input type="range" id="sl_view" min="5" max="50" value="15" step="1">
      <span id="lbl_view">15</span>
    </div>
    <div class="row">
      <label>Separation range</label>
      <input type="range" id="sl_sep" min="1" max="20" value="5" step="0.5">
      <span id="lbl_sep">5.0</span>
    </div>
    <div class="row">
      <label>Cohesion</label>
      <input type="range" id="sl_coh" min="0" max="20" value="5" step="1">
      <span id="lbl_coh">5</span>
    </div>
    <div class="row">
      <label>Alignment</label>
      <input type="range" id="sl_al" min="0" max="20" value="8" step="1">
      <span id="lbl_al">8</span>
    </div>
    <div class="row">
      <label>Target pull</label>
      <input type="range" id="sl_tgt" min="0" max="20" value="5" step="1">
      <span id="lbl_tgt">5</span>
    </div>
    <div class="row">
      <label>Obstacle push</label>
      <input type="range" id="sl_obs" min="0" max="20" value="10" step="1">
      <span id="lbl_obs">10</span>
    </div>
  </div>

  <div id="btnrow">
    <button onclick="resetSwarm()">Reset swarm</button>
    <button onclick="togglePause()">Pause / Resume</button>
    <button onclick="addObstacle()">Add obstacle</button>
    <button onclick="clearObstacles()">Clear obstacles</button>
  </div>

  <div id="stats" id="stats">Click on the canvas to move the target (green star)</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 700, H = 420;

// ── Parameters (read from sliders) ─────────────────────────────
let N        = 30;
let MAX_SPD  = 2.0;
let MIN_SPD  = 0.4;
let VIEW_R   = 15;
let SEP_R    = 5;
let W_COH    = 0.005;
let W_AL     = 0.08;
let W_TGT    = 0.05;
let W_OBS    = 0.8;
let paused   = false;
let frame    = 0;

// ── Obstacles ───────────────────────────────────────────────────
let obstacles = [
  {x: 180, y: 140, r: 22},
  {x: 520, y: 280, r: 28},
  {x: 350, y: 200, r: 18},
];

// ── Target ──────────────────────────────────────────────────────
let target = {x: W * 0.7, y: H * 0.5};

// ── Drones ──────────────────────────────────────────────────────
let pos = [], vel = [];

function resetSwarm() {
  pos = []; vel = [];
  for (let i = 0; i < N; i++) {
    pos.push({x: Math.random() * W, y: Math.random() * H});
    let a = Math.random() * Math.PI * 2;
    vel.push({x: Math.cos(a) * MIN_SPD, y: Math.sin(a) * MIN_SPD});
  }
}
resetSwarm();

// ── Slider wiring ───────────────────────────────────────────────
function wire(id, labelId, callback) {
  const el = document.getElementById(id);
  const lb = document.getElementById(labelId);
  el.addEventListener('input', () => {
    lb.textContent = parseFloat(el.value).toFixed(el.step.includes('.') ? 1 : 0);
    callback(parseFloat(el.value));
  });
}

wire('sl_n',    'lbl_n',    v => { N = Math.round(v); resetSwarm(); });
wire('sl_spd',  'lbl_spd',  v => { MAX_SPD = v; MIN_SPD = v * 0.2; });
wire('sl_view', 'lbl_view', v => { VIEW_R = v; });
wire('sl_sep',  'lbl_sep',  v => { SEP_R = v; });
wire('sl_coh',  'lbl_coh',  v => { W_COH = v * 0.001; });
wire('sl_al',   'lbl_al',   v => { W_AL  = v * 0.01; });
wire('sl_tgt',  'lbl_tgt',  v => { W_TGT = v * 0.01; });
wire('sl_obs',  'lbl_obs',  v => { W_OBS = v * 0.1; });

// ── Click to move target ────────────────────────────────────────
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  target.x = (e.clientX - rect.left) * scaleX;
  target.y = (e.clientY - rect.top)  * scaleY;
});

// ── Button handlers ─────────────────────────────────────────────
function togglePause() { paused = !paused; }

function addObstacle() {
  obstacles.push({
    x: 100 + Math.random() * (W - 200),
    y: 60  + Math.random() * (H - 120),
    r: 15 + Math.random() * 20
  });
}

function clearObstacles() { obstacles = []; }

// ── Physics step ────────────────────────────────────────────────
function clampSpeed(vx, vy) {
  const spd = Math.sqrt(vx*vx + vy*vy) || 1e-6;
  const clamped = Math.min(Math.max(spd, MIN_SPD), MAX_SPD);
  return {x: vx/spd*clamped, y: vy/spd*clamped};
}

function step() {
  const newVel = vel.map(v => ({x: v.x, y: v.y}));

  for (let i = 0; i < N; i++) {
    let ax=0, ay=0;  // accumulated acceleration

    // Collect neighbours
    let alignX=0, alignY=0;
    let cohX=0, cohY=0, cohCount=0;
    let sepX=0, sepY=0;

    for (let j = 0; j < N; j++) {
      if (i === j) continue;
      const dx = pos[j].x - pos[i].x;
      const dy = pos[j].y - pos[i].y;
      const d  = Math.sqrt(dx*dx + dy*dy);

      if (d < VIEW_R) {
        // Alignment
        alignX += vel[j].x;
        alignY += vel[j].y;
        // Cohesion
        cohX += pos[j].x;
        cohY += pos[j].y;
        cohCount++;
      }
      if (d < SEP_R && d > 0) {
        // Separation — push away
        sepX -= dx / d;
        sepY -= dy / d;
      }
    }

    if (cohCount > 0) {
      ax += W_AL  * (alignX/cohCount - vel[i].x);
      ay += W_AL  * (alignY/cohCount - vel[i].y);
      ax += W_COH * (cohX/cohCount - pos[i].x);
      ay += W_COH * (cohY/cohCount - pos[i].y);
    }
    ax += sepX * 0.1;
    ay += sepY * 0.1;

    // Target pull
    const tdx = target.x - pos[i].x;
    const tdy = target.y - pos[i].y;
    const td  = Math.sqrt(tdx*tdx + tdy*tdy) || 1;
    ax += W_TGT * tdx/td;
    ay += W_TGT * tdy/td;

    // Obstacle repulsion
    for (const obs of obstacles) {
      const odx = pos[i].x - obs.x;
      const ody = pos[i].y - obs.y;
      const od  = Math.sqrt(odx*odx + ody*ody) || 1;
      const danger = obs.r + VIEW_R;
      if (od < danger) {
        const strength = (danger - od) / danger;
        ax += W_OBS * strength * odx/od;
        ay += W_OBS * strength * ody/od;
      }
    }

    newVel[i].x = vel[i].x + ax;
    newVel[i].y = vel[i].y + ay;

    // Clamp speed
    const c = clampSpeed(newVel[i].x, newVel[i].y);
    newVel[i].x = c.x;
    newVel[i].y = c.y;
  }

  // Apply velocities + wrap edges
  for (let i = 0; i < N; i++) {
    vel[i] = newVel[i];
    pos[i].x = (pos[i].x + vel[i].x + W) % W;
    pos[i].y = (pos[i].y + vel[i].y + H) % H;
  }
}

// ── Render ──────────────────────────────────────────────────────
function draw() {
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 50) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 50) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }

  // Obstacles
  for (const obs of obstacles) {
    // Danger zone
    ctx.beginPath();
    ctx.arc(obs.x, obs.y, obs.r + VIEW_R, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,68,68,0.06)';
    ctx.fill();
    // Core
    ctx.beginPath();
    ctx.arc(obs.x, obs.y, obs.r, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,68,68,0.30)';
    ctx.fill();
    ctx.strokeStyle = '#ff4444';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = '#ff9999';
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('X', obs.x, obs.y);
  }

  // Target star
  ctx.fillStyle = '#69f0ae';
  ctx.font = '20px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('★', target.x, target.y);

  // Drones
  for (let i = 0; i < N; i++) {
    const spd = Math.sqrt(vel[i].x**2 + vel[i].y**2);
    const t   = (spd - MIN_SPD) / (MAX_SPD - MIN_SPD + 0.001);
    // Colour: slow = #4fc3f7 (cyan), fast = #ef9f27 (amber)
    const r = Math.round(79  + t * (239 - 79));
    const g = Math.round(195 + t * (159 - 195));
    const b = Math.round(247 + t * (39  - 247));

    const angle = Math.atan2(vel[i].y, vel[i].x);
    ctx.save();
    ctx.translate(pos[i].x, pos[i].y);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(8, 0);
    ctx.lineTo(-5, -4);
    ctx.lineTo(-3, 0);
    ctx.lineTo(-5, 4);
    ctx.closePath();
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fill();
    ctx.restore();
  }

  // Stats bar
  const avgSpd = vel.reduce((s,v) => s + Math.sqrt(v.x**2+v.y**2), 0) / N;
  document.getElementById('stats').textContent =
    `frame: ${frame}  |  drones: ${N}  |  obstacles: ${obstacles.length}  |  ` +
    `avg speed: ${avgSpd.toFixed(2)}  |  ` +
    `target: (${Math.round(target.x)}, ${Math.round(target.y)})  |  ` +
    (paused ? 'PAUSED' : 'RUNNING');
}

// ── Main loop ───────────────────────────────────────────────────
function loop() {
  if (!paused) {
    step();
    frame++;
  }
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
